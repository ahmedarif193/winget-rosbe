name: Publish image

# Builds the rosbe-builder Docker image and pushes it to ghcr.io.
#
# Triggers:
#   - Push to main when docker/ or this workflow changes (publishes :latest and :sha)
#   - Manual workflow_dispatch (publishes whatever you specify)
#   - Release tag (publishes :<tag> and :latest)

on:
  push:
    branches: [main]
    paths:
      - 'docker/**'
      - '.github/workflows/publish-image.yml'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Extra tag to push (in addition to :latest and :sha)'
        required: false
        default: ''

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/rosbe-builder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          SHA="${GITHUB_SHA::12}"
          TAGS="${IMAGE}:latest,${IMAGE}:sha-${SHA}"
          if [ "${{ github.event_name }}" = "release" ]; then
            REL="${{ github.event.release.tag_name }}"
            TAGS="${TAGS},${IMAGE}:${REL}"
          fi
          if [ -n "${{ inputs.tag }}" ]; then
            TAGS="${TAGS},${IMAGE}:${{ inputs.tag }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Resolved tags: ${TAGS}"

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          echo "## Image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Tags:" >> "$GITHUB_STEP_SUMMARY"
          echo '${{ steps.tags.outputs.tags }}' | tr ',' '\n' | sed 's/^/  - /' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull with:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "podman pull ${IMAGE}:latest" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
