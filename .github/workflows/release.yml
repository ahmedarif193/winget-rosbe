name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'publish:')
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags to compute next version

      - id: v
        run: |
          LAST_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
          if [ -z "$LAST_TAG" ]; then
            VERSION="1.0"
          else
            LAST_VER=${LAST_TAG#v}
            MAJOR=${LAST_VER%.*}
            MINOR=${LAST_VER##*.}
            VERSION="$MAJOR.$((MINOR + 1))"
          fi
          echo "Resolved next version: $VERSION (last tag: ${LAST_TAG:-none})"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  package:
    needs: gate
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip unzip xz-utils p7zip-full curl jq uuid-runtime

      - name: Build archives
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh --windows-only "$VERSION"

      - name: Materialize winget manifest for this version
        run: |
          set -e
          SRC=winget/manifests/r/ReactOS/RosBE/1.0
          DST=winget/manifests/r/ReactOS/RosBE/$VERSION
          if [ ! -d "$DST" ]; then
            mkdir -p "$DST"
            for f in "$SRC"/*.yaml; do
              name=$(basename "$f")
              sed "s|PackageVersion: 1.0|PackageVersion: $VERSION|; \
                   s|rosbe-modern-1.0-win-x64|rosbe-modern-$VERSION-win-x64|g; \
                   s|releases/download/v1.0/|releases/download/v$VERSION/|g" \
                  "$f" > "$DST/$name"
            done
          fi
          HASH=$(awk '/win-x64.zip/ {print toupper($1)}' dist/SHA256SUMS.txt)
          sed -i "s|InstallerSha256:.*|InstallerSha256: $HASH|" \
              "$DST/ReactOS.RosBE.installer.yaml"

      - name: Compose release body
        id: body
        run: |
          # shellcheck source=scripts/versions.env
          source scripts/versions.env
          {
            echo "body<<RELEASEBODYEOF"
            echo "## RosBE Modern v$VERSION"
            echo ""
            echo "### Bundled versions"
            echo "| Component | Version |"
            echo "|-----------|---------|"
            echo "| LLVM-MinGW | $LLVM_VERSION |"
            echo "| winlibs GCC (Windows) | $WINLIBS_TAG (GCC $GCC_VERSION + mingw-w64 $MINGW_W64_VERSION) |"
            echo "| CMake | $CMAKE_VERSION |"
            echo "| Ninja | $NINJA_VERSION |"
            echo "| WinFlexBison | $WINFLEXBISON_VERSION |"
            echo ""
            echo "### Install"
            echo '```'
            echo "winget install ReactOS.RosBE"
            echo '```'
            echo ""
            echo "### Checksums"
            echo '```'
            cat dist/SHA256SUMS.txt
            echo '```'
            echo "RELEASEBODYEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          name: RosBE Modern v${{ needs.gate.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*.tar.xz
            dist/*.zip
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false

      - uses: actions/upload-artifact@v4
        with:
          name: winget-manifests
          path: winget/manifests/r/ReactOS/RosBE/${{ needs.gate.outputs.version }}/

  publish-winget:
    needs: [gate, package]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      GH_TOKEN: ${{ secrets.WINGET_PUBLISHER_RELEASER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: winget-manifests
          path: winget/manifests/r/ReactOS/RosBE/${{ needs.gate.outputs.version }}/

      - name: Install deps
        run: sudo apt-get install -y -qq uuid-runtime

      - name: Open PR on microsoft/winget-pkgs
        run: |
          chmod +x scripts/publish-winget.sh
          ./scripts/publish-winget.sh "$VERSION"
