name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'publish:')
    outputs:
      version: ${{ steps.v.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need all tags to compute next version

      - id: v
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          # Strip "publish:" prefix, take first line, trim, take first word.
          TAIL="${MSG#publish:}"
          TAIL="${TAIL%%$'\n'*}"
          TAIL="$(echo "$TAIL" | xargs)"
          FIRST="${TAIL%% *}"

          if [[ "$FIRST" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            VERSION="$FIRST"
            echo "Explicit version requested: $VERSION"
          else
            LAST_TAG=$(git tag -l 'v[0-9]*' --sort=-v:refname | head -1)
            if [ -z "$LAST_TAG" ]; then
              VERSION="1.0.0"
            else
              LAST_VER=${LAST_TAG#v}
              IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST_VER"
              MINOR=${MINOR:-0}
              PATCH=${PATCH:-0}
              VERSION="$MAJOR.$((MINOR + 1)).0"
            fi
            echo "Auto-incremented version: $VERSION (last tag: ${LAST_TAG:-none})"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  package:
    needs: gate
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq zip unzip xz-utils p7zip-full curl jq uuid-runtime gcc-mingw-w64-x86-64 wine64

      - name: Delete existing release+tag (re-publish support)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v$VERSION" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Deleting existing release v$VERSION (re-publish)..."
            gh release delete "v$VERSION" --repo "${{ github.repository }}" --yes --cleanup-tag
          else
            echo "No existing release v$VERSION, proceeding."
          fi

      - name: Test bootstrapper
        run: cargo test --manifest-path bootstrapper/Cargo.toml --locked

      - name: Build archives
        run: |
          chmod +x scripts/package.sh
          ./scripts/package.sh --windows-only "$VERSION"

      - name: Verify bootstrapper end to end
        run: |
          chmod +x scripts/verify-bootstrapper-e2e.sh
          ./scripts/verify-bootstrapper-e2e.sh "$VERSION"

      - name: Materialize winget manifest for this version
        run: |
          set -e
          SRC=winget/manifests/r/ReactOS/RosBE/1.0.0
          DST=winget/manifests/r/ReactOS/RosBE/$VERSION
          if [ ! -d "$DST" ]; then
            mkdir -p "$DST"
            for f in "$SRC"/*.yaml; do
              name=$(basename "$f")
              sed "s|PackageVersion: 1.0.0|PackageVersion: $VERSION|; \
                   s|rosbe-bootstrapper-1.0.0-win-x64.zip|rosbe-bootstrapper-$VERSION-win-x64.zip|g; \
                   s|releases/download/v1.0.0/|releases/download/v$VERSION/|g" \
                  "$f" > "$DST/$name"
            done
          fi
          ASSET="rosbe-bootstrapper-$VERSION-win-x64.zip"
          HASH=$(awk -v asset="$ASSET" '$2==asset {print toupper($1)}' dist/SHA256SUMS.txt)
          sed -i "s|InstallerSha256:.*|InstallerSha256: $HASH|" \
              "$DST/ReactOS.RosBE.installer.yaml"

      - name: Compose release body
        id: body
        run: |
          # shellcheck source=scripts/versions.env
          source scripts/versions.env
          {
            echo "body<<RELEASEBODYEOF"
            echo "## RosBE Modern v$VERSION"
            echo ""
            echo "### Managed toolchain versions"
            echo "| Component | Version |"
            echo "|-----------|---------|"
            echo "| LLVM-MinGW | $LLVM_VERSION |"
            echo "| MinGW-GCC (ct-ng Canadian-cross) | $GCC_VERSION ($GCC_TAG from ahmedarif193/mingw-gcc15.2) |"
            echo "| CMake | $CMAKE_VERSION |"
            echo "| Ninja | $NINJA_VERSION |"
            echo "| WinFlexBison | $WINFLEXBISON_VERSION |"
            echo ""
            echo "### Install"
            echo '```'
            echo "winget install ReactOS.RosBE"
            echo "rosbe install"
            echo "rosbe enable"
            echo '```'
            echo ""
            echo "### Checksums"
            echo '```'
            cat dist/SHA256SUMS.txt
            echo '```'
            echo "RELEASEBODYEOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.gate.outputs.version }}
          name: RosBE Modern v${{ needs.gate.outputs.version }}
          body: ${{ steps.body.outputs.body }}
          files: |
            dist/*.tar.xz
            dist/*.exe
            dist/*.zip
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false

      - uses: actions/upload-artifact@v4
        with:
          name: winget-manifests
          path: winget/manifests/r/ReactOS/RosBE/${{ needs.gate.outputs.version }}/

  publish-winget:
    needs: [gate, package]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      GH_TOKEN: ${{ secrets.WINGET_PUBLISHER_RELEASER }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: winget-manifests
          path: winget/manifests/r/ReactOS/RosBE/${{ needs.gate.outputs.version }}/

      - name: Install deps
        run: sudo apt-get install -y -qq uuid-runtime

      - name: Open PR on microsoft/winget-pkgs
        run: |
          chmod +x scripts/publish-winget.sh
          ./scripts/publish-winget.sh "$VERSION"
