ShortDescription: Modern ReactOS Build Environment with LLVM/Clang 21 and GCC 15.2
Description: |-
  RosBE Modern is a drop-in replacement for the legacy ReactOS Build Environment (RosBE).
  It ships a self-contained, portable toolchain bundle for building ReactOS from source:
    - LLVM-MinGW (Clang 21.1.7) cross-compiler
    - MinGW-GCC 15.2 cross-compiler
    - CMake 3.31.6
    - Ninja 1.12.1
    - Flex 2.6.4 & Bison 3.8.2
  Target architectures: i686, x86_64, aarch64.
Moniker: rosbe
